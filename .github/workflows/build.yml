name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Pack Magisk module
        run: |
          zip -r "FODFixObsidian-${GITHUB_REF_NAME#v}.zip" \
            module.prop service.sh system.prop

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: FODFixObsidian-*.zip
          generate_release_notes: true
